<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 vs 🇲🇽 축구 승부 예측</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --kr: #C60C30;
    --mx: #006847;
    --gold: #FFD700;
    --dark: #0a0a0f;
    --mid: #12121a;
    --card: #1a1a28;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #888;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    padding: 60px 20px 40px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 20% 50%, rgba(198,12,48,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 50%, rgba(0,104,71,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-label {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.3);
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 28px;
  }
  .matchup {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .flag { font-size: 64px; line-height: 1; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)); }
  .team-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }
  .team-name.kr { color: #ff4466; }
  .team-name.mx { color: #00cc88; }
  .vs {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 40px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
    padding: 0 4px;
  }
  .hero-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 32px 20px 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--gold);
    font-weight: 700;
  }
  .tab-btn:not(:last-child) { border-right: 1px solid var(--border); }

  /* ── PAGES ── */
  .page { display: none; padding: 24px 20px 60px; max-width: 520px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
  }
  .step {
    margin-bottom: 28px;
  }
  .step-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--kr), #ff6688);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .step-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  input[type="text"], input[type="tel"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: rgba(255,215,0,0.4); }
  input::placeholder { color: var(--muted); }

  /* Score picker */
  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
  }
  .score-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .score-team-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-team-name.kr { color: #ff4466; }
  .score-team-name.mx { color: #00cc88; }
  .score-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.07);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    line-height: 1;
  }
  .score-btn:hover { background: rgba(255,255,255,0.14); }
  .score-val {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 36px;
    min-width: 40px;
    text-align: center;
    line-height: 1;
  }
  .score-divider {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    color: var(--gold);
    padding-top: 20px;
  }

  /* Radio choice */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .choice-row:hover { background: rgba(255,255,255,0.08); }
  .choice-row.selected {
    border-color: var(--gold);
    background: rgba(255,215,0,0.07);
  }
  .choice-row input[type="radio"] { display: none; }
  .choice-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color .2s;
  }
  .choice-row.selected .choice-dot {
    border-color: var(--gold);
    background: var(--gold);
  }
  .choice-row.selected .choice-dot::after {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dark);
  }
  .choice-text { font-size: 14px; font-weight: 500; }

  /* Submit btn */
  .submit-btn {
    width: 100%;
    padding: 16px;
    margin-top: 8px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--kr) 0%, #8b0022 50%, var(--mx) 100%);
    color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform .5s;
  }
  .submit-btn:hover::before { transform: translateX(100%); }
  .submit-btn:hover { opacity: .9; }
  .submit-btn:active { transform: scale(.98); }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Success */
  .success-box {
    text-align: center;
    padding: 40px 20px;
  }
  .success-icon { font-size: 64px; margin-bottom: 16px; }
  .success-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 26px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .success-sub { font-size: 14px; color: var(--muted); line-height: 1.7; }

  /* ── ADMIN ── */
  .admin-gate {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
  }
  .admin-gate h3 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    margin-bottom: 6px;
    color: var(--gold);
  }
  .admin-gate p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .admin-pw-row { display: flex; gap: 10px; }
  .admin-pw-row input { flex: 1; }
  .admin-login-btn {
    padding: 0 20px;
    border-radius: 10px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
  }
  .admin-login-btn:hover { background: rgba(255,215,0,0.1); }
  .admin-err { font-size: 12px; color: var(--kr); margin-top: 8px; min-height: 16px; }

  /* Admin panel */
  .admin-panel { display: none; }
  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .admin-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    color: var(--gold);
  }
  .admin-count {
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.06);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .export-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--mx);
    background: transparent;
    color: #00cc88;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: background .2s;
  }
  .export-btn:hover { background: rgba(0,104,71,0.2); }

  .entry-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .entry-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .entry-nick {
    font-weight: 700;
    font-size: 15px;
  }
  .entry-phone {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .entry-time {
    font-size: 11px;
    color: var(--muted);
  }
  .entry-score {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    margin-bottom: 10px;
  }
  .entry-score .kr-score { color: #ff4466; }
  .entry-score .mx-score { color: #00cc88; }
  .entry-score .colon { color: var(--muted); font-size: 16px; }
  .entry-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
  }
  .tag span { color: var(--gold); font-weight: 700; }

  .no-entries {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  /* Delete btn */
  .del-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color .2s;
  }
  .del-btn:hover { color: var(--kr); }

  /* Footer divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 20px;
  }

  @media (max-width: 400px) {
    .flag { font-size: 48px; }
    .vs { font-size: 30px; }
    .score-val { font-size: 28px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-label">⚽ 승부 예측 이벤트</div>
  <div class="matchup">
    <div class="team">
      <div class="flag">🇰🇷</div>
      <div class="team-name kr">대한민국</div>
    </div>
    <div class="vs">VS</div>
    <div class="team">
      <div class="flag">🇲🇽</div>
      <div class="team-name mx">멕시코</div>
    </div>
  </div>
  <div class="hero-sub">당신의 예측을 남겨주세요!</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('form')">📝 예측 참여</button>
  <button class="tab-btn" onclick="showTab('admin')">🔐 관리자</button>
</div>

<!-- FORM PAGE -->
<div class="page active" id="page-form">
  <div class="form-card" id="form-area">

    <!-- 1. 닉네임 -->
    <div class="step">
      <div class="step-label">
        <div class="step-num">1</div>
        <div class="step-title">닉네임</div>
      </div>
      <input type="text" id="nickname" placeholder="사용할 닉네임을 입력하세요" maxlength="20">
    </div>

    <!-- 2. 폰번호 -->
    <div class="step">
      <div class="step-label">
        <div class="step-num">2</div>
        <div class="step-title">전화번호</div>
      </div>
      <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="13" oninput="autoHyphen(this)">
    </div>

    <!-- 3. 스코어 -->
    <div class="step">
      <div class="step-label">
        <div class="step-num">3</div>
        <div class="step-title">최종 스코어 예측</div>
      </div>
      <div class="score-row">
        <div class="score-box">
          <div class="score-team-name kr">🇰🇷 한국</div>
          <div class="score-controls">
            <button class="score-btn" onclick="changeScore('kr',-1)">−</button>
            <div class="score-val" id="score-kr">0</div>
            <button class="score-btn" onclick="changeScore('kr',1)">+</button>
          </div>
        </div>
        <div class="score-divider">:</div>
        <div class="score-box">
          <div class="score-team-name mx">🇲🇽 멕시코</div>
          <div class="score-controls">
            <button class="score-btn" onclick="changeScore('mx',-1)">−</button>
            <div class="score-val" id="score-mx">0</div>
            <button class="score-btn" onclick="changeScore('mx',1)">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 4. 첫골 국가 -->
    <div class="step">
      <div class="step-label">
        <div class="step-num">4</div>
        <div class="step-title">첫 골을 넣는 나라</div>
      </div>
      <div class="choices" id="first-goal-choices">
        <label class="choice-row" onclick="selectChoice(this,'firstGoal','대한민국')">
          <input type="radio" name="firstGoal" value="대한민국">
          <div class="choice-dot"></div>
          <div class="choice-text">🇰🇷 대한민국</div>
        </label>
        <label class="choice-row" onclick="selectChoice(this,'firstGoal','멕시코')">
          <input type="radio" name="firstGoal" value="멕시코">
          <div class="choice-dot"></div>
          <div class="choice-text">🇲🇽 멕시코</div>
        </label>
        <label class="choice-row" onclick="selectChoice(this,'firstGoal','무득점')">
          <input type="radio" name="firstGoal" value="무득점">
          <div class="choice-dot"></div>
          <div class="choice-text">⚪ 무득점 (0:0)</div>
        </label>
      </div>
    </div>

    <!-- 5. 한국 첫골 주인공 -->
    <div class="step" id="step-scorer">
      <div class="step-label">
        <div class="step-num">5</div>
        <div class="step-title">한국팀 첫 골의 주인공</div>
      </div>
      <input type="text" id="scorer" placeholder="선수 이름을 입력하세요 (예: 손흥민)" maxlength="20">
      <div style="font-size:11px;color:var(--muted);margin-top:6px;">한국이 득점하지 못한다면 '없음' 등으로 적어주세요</div>
    </div>

    <hr class="divider">
    <button class="submit-btn" onclick="submitForm()">🎯 예측 제출하기</button>
  </div>

  <!-- Success -->
  <div class="success-box" id="success-area" style="display:none;">
    <div class="success-icon">🎉</div>
    <div class="success-title">예측 완료!</div>
    <div class="success-sub">소중한 예측을 남겨주셨습니다.<br>결과를 기다려봐요! ⚽</div>
  </div>
</div>

<!-- ADMIN PAGE -->
<div class="page" id="page-admin">

  <!-- Gate -->
  <div class="admin-gate" id="admin-gate">
    <h3>🔐 관리자 전용</h3>
    <p>예측 결과를 보려면 비밀번호를 입력하세요</p>
    <div class="admin-pw-row">
      <input type="password" id="admin-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')adminLogin()">
      <button class="admin-login-btn" onclick="adminLogin()">확인</button>
    </div>
    <div class="admin-err" id="admin-err"></div>
  </div>

  <!-- Panel -->
  <div class="admin-panel" id="admin-panel">
    <div class="admin-header">
      <div>
        <div class="admin-title">📊 예측 현황</div>
        <div class="admin-count" id="entry-count">총 0명 참여</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="export-btn" onclick="exportCSV()">CSV 다운로드</button>
        <button class="export-btn" onclick="clearAll()" style="border-color:var(--kr);color:#ff6688;">전체 삭제</button>
      </div>
    </div>
    <div id="entries-list"></div>
  </div>
</div>

<script>
  // ── STATE ──
  const ADMIN_PW = 'namin2025'; // ← 관리자 비밀번호 (바꿔도 됩니다)
  const STORAGE_KEY = 'kr_mx_predictions';

  let scores = { kr: 0, mx: 0 };
  let selectedFirstGoal = null;
  let adminLoggedIn = false;

  // ── TABS ──
  function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='form') || (i===1 && tab==='admin')));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    if (tab === 'admin' && adminLoggedIn) renderEntries();
  }

  // ── SCORE ──
  function changeScore(team, delta) {
    scores[team] = Math.max(0, Math.min(20, scores[team] + delta));
    document.getElementById('score-' + team).textContent = scores[team];
  }

  // ── RADIO ──
  function selectChoice(el, name, val) {
    document.querySelectorAll(`[name="${name}"]`).forEach(r => {
      r.closest('.choice-row').classList.remove('selected');
    });
    el.classList.add('selected');
    el.querySelector('input').checked = true;
    if (name === 'firstGoal') selectedFirstGoal = val;
  }

  // ── PHONE FORMAT ──
  function autoHyphen(el) {
    let v = el.value.replace(/\D/g,'');
    if (v.length <= 3) el.value = v;
    else if (v.length <= 7) el.value = v.slice(0,3) + '-' + v.slice(3);
    else el.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
  }

  // ── STORAGE ──
  function getEntries() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
  }
  function saveEntries(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  // ── SUBMIT ──
  function submitForm() {
    const nickname = document.getElementById('nickname').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const scorer = document.getElementById('scorer').value.trim();

    if (!nickname) return alert('닉네임을 입력해주세요!');
    if (!phone) return alert('전화번호를 입력해주세요!');
    if (!selectedFirstGoal) return alert('첫 골을 넣는 나라를 선택해주세요!');
    if (!scorer) return alert('한국팀 첫 골의 주인공을 입력해주세요!');

    const entries = getEntries();

    // 1인 1회: 폰번호 기준
    if (entries.find(e => e.phone === phone)) {
      return alert('이미 참여하신 번호입니다. 1인 1회만 가능합니다.');
    }

    const entry = {
      id: Date.now(),
      nickname,
      phone,
      scoreKr: scores.kr,
      scoreMx: scores.mx,
      firstGoal: selectedFirstGoal,
      scorer,
      time: new Date().toLocaleString('ko-KR')
    };

    entries.push(entry);
    saveEntries(entries);

    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-area').style.display = 'block';
  }

  // ── ADMIN LOGIN ──
  function adminLogin() {
    const pw = document.getElementById('admin-pw').value;
    if (pw === ADMIN_PW) {
      adminLoggedIn = true;
      document.getElementById('admin-gate').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      renderEntries();
    } else {
      document.getElementById('admin-err').textContent = '비밀번호가 틀렸습니다.';
      setTimeout(() => document.getElementById('admin-err').textContent = '', 2000);
    }
  }

  // ── RENDER ENTRIES ──
  function renderEntries() {
    const entries = getEntries();
    document.getElementById('entry-count').textContent = `총 ${entries.length}명 참여`;
    const list = document.getElementById('entries-list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="no-entries">아직 참여자가 없습니다 ⚽</div>';
      return;
    }
    list.innerHTML = [...entries].reverse().map(e => `
      <div class="entry-card">
        <div class="entry-top">
          <div>
            <div class="entry-nick">${esc(e.nickname)}</div>
            <div class="entry-phone">${esc(e.phone)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="entry-time">${esc(e.time)}</div>
            <button class="del-btn" onclick="deleteEntry(${e.id})" title="삭제">✕</button>
          </div>
        </div>
        <div class="entry-score">
          <span class="kr-score">🇰🇷 ${e.scoreKr}</span>
          <span class="colon">:</span>
          <span class="mx-score">${e.scoreMx} 🇲🇽</span>
        </div>
        <div class="entry-tags">
          <div class="tag">첫골 <span>${esc(e.firstGoal)}</span></div>
          <div class="tag">한국 첫골 <span>${esc(e.scorer)}</span></div>
        </div>
      </div>
    `).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function deleteEntry(id) {
    if (!confirm('이 항목을 삭제할까요?')) return;
    const filtered = getEntries().filter(e => e.id !== id);
    saveEntries(filtered);
    renderEntries();
  }

  function clearAll() {
    if (!confirm('모든 예측 데이터를 삭제할까요? 복구 불가!')) return;
    saveEntries([]);
    renderEntries();
  }

  // ── CSV ──
  function exportCSV() {
    const entries = getEntries();
    if (entries.length === 0) return alert('데이터가 없습니다.');
    const header = '닉네임,전화번호,한국점수,멕시코점수,첫골국가,한국첫골주인공,제출시간';
    const rows = entries.map(e =>
      [e.nickname, e.phone, e.scoreKr, e.scoreMx, e.firstGoal, e.scorer, e.time]
      .map(v => `"${String(v).replace(/"/g,'""')}"`)
      .join(',')
    );
    const csv = '\uFEFF' + [header, ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'kr_mx_predictions.csv'; a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
